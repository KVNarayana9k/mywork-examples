<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Travel History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

</head>

<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a href="index.html" class="navbar-brand"> 🚆 Metro Ticket Booking </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow-lg p-4">
            <h2 class="text-center mb-4">Travel History</h2>

            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-primary">
                        <tr>
                            <th>Ticket ID</th>

                            <th>Name</th>

                            <th>From</th>

                            <th>To</th>

                            <th>Date</th>

                            <th>Passengers</th>

                            <th>Fare</th>

                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="historyTable"></tbody>
                </table>
            </div>

            <div class="text-center mt-3">
                <a href="search-route.html" class="btn btn-success">
                    Book New Ticket
                </a>

                <a href="index.html" class="btn btn-secondary"> Home </a>
            </div>
        </div>
    </div>

    <script src="js/history.js"></script>
</body>
<script>
    let history = JSON.parse(localStorage.getItem("history")) || [];

    let rows = "";

    if (history.length == 0) {
        rows = `
<tr>
<td colspan="8" class="text-center text-danger">
No Travel History Found
</td>
</tr>
`;
    } else {
        history.forEach(function (ticket) {
            rows += `

<tr>

<td>${ticket.ticketId}</td>

<td>${ticket.name}</td>

<td>${ticket.from}</td>

<td>${ticket.to}</td>

<td>${ticket.date}</td>

<td>${ticket.passengers}</td>

<td>₹${ticket.fare}</td>

<td>

<span class="badge bg-success">

${ticket.status}

</span>

</td>

</tr>

`;
        });
    }

    document.getElementById("historyTable").innerHTML = rows;
</script>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Metro Ticket</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a href="index.html" class="navbar-brand">
            🚆 Metro Ticket Booking
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Passenger Details</h2>

        <div class="mb-3">
            <label class="form-label">Passenger Name</label>
            <input type="text" class="form-control" id="name">
        </div>

        <div class="mb-3">
            <label class="form-label">Mobile Number</label>
            <input type="tel" class="form-control" id="mobile">
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email">
        </div>

        <hr>

        <h5>Journey Details</h5>

        <p><strong>From:</strong> <span id="from"></span></p>
        <p><strong>To:</strong> <span id="to"></span></p>
        <p><strong>Date:</strong> <span id="date"></span></p>
        <p><strong>Passengers:</strong> <span id="passengers"></span></p>
        <p><strong>Total Fare:</strong> ₹<span id="fare"></span></p>

        <button class="btn btn-success w-100 mt-3" onclick="confirmBooking()">
            Confirm Booking
        </button>

    </div>

</div>

<script src="js/booking.js"></script>

</body>
<script>
    document.getElementById("from").innerHTML = localStorage.getItem("from");
document.getElementById("to").innerHTML = localStorage.getItem("to");
document.getElementById("date").innerHTML = localStorage.getItem("date");
document.getElementById("passengers").innerHTML = localStorage.getItem("passengers");
document.getElementById("fare").innerHTML = localStorage.getItem("fare");

function confirmBooking() {

    let name = document.getElementById("name").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let email = document.getElementById("email").value.trim();

    if (name == "" || mobile == "" || email == "") {
        alert("Please fill all passenger details.");
        return;
    }

    let ticket = {
        ticketId: "MT" + Date.now(),
        name: name,
        mobile: mobile,
        email: email,
        from: localStorage.getItem("from"),
        to: localStorage.getItem("to"),
        date: localStorage.getItem("date"),
        passengers: localStorage.getItem("passengers"),
        fare: localStorage.getItem("fare"),
        status: "Booked"
    };

    localStorage.setItem("ticket", JSON.stringify(ticket));

    let history = JSON.parse(localStorage.getItem("history")) || [];
    history.push(ticket);
    localStorage.setItem("history", JSON.stringify(history));

    alert("Ticket Booked Successfully!");

    window.location.href = "ticket.html";
}
</script>
</html>

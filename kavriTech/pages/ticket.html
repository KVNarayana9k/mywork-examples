<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Metro QR Ticket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a href="index.html" class="navbar-brand">
🚆 Metro Ticket Booking
</a>

</div>

</nav>


<div class="container mt-5">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">
Metro QR Ticket
</h2>

<div class="row">

<div class="col-md-7">

<p><strong>Ticket ID :</strong>
<span id="ticketId"></span></p>

<p><strong>Passenger :</strong>
<span id="name"></span></p>

<p><strong>Mobile :</strong>
<span id="mobile"></span></p>

<p><strong>Email :</strong>
<span id="email"></span></p>

<hr>

<p><strong>From :</strong>
<span id="from"></span></p>

<p><strong>To :</strong>
<span id="to"></span></p>

<p><strong>Date :</strong>
<span id="date"></span></p>

<p><strong>Passengers :</strong>
<span id="passengers"></span></p>

<p><strong>Total Fare :</strong>
₹<span id="fare"></span></p>

<p><strong>Status :</strong>
<span class="badge bg-success" id="status"></span></p>

</div>

<div class="col-md-5 text-center">

<h5>Mock QR Ticket</h5>

<img src="images/qr.png"
class="img-fluid border rounded p-2"
width="220">

</div>

</div>

<hr>

<div class="d-grid gap-2">

<button class="btn btn-primary"
onclick="window.print()">
🖨 Print Ticket
</button>

<a href="cancel.html"
class="btn btn-danger">
❌ Cancel Ticket
</a>

<a href="history.html"
class="btn btn-success">
📋 Travel History
</a>

</div>

</div>

</div>

<script src="js/ticket.js"></script>

</body>
<script>
    let ticket = JSON.parse(localStorage.getItem("ticket"));

if(ticket==null){

alert("No Ticket Found");

window.location.href="index.html";

}

document.getElementById("ticketId").innerHTML=ticket.ticketId;

document.getElementById("name").innerHTML=ticket.name;

document.getElementById("mobile").innerHTML=ticket.mobile;

document.getElementById("email").innerHTML=ticket.email;

document.getElementById("from").innerHTML=ticket.from;

document.getElementById("to").innerHTML=ticket.to;

document.getElementById("date").innerHTML=ticket.date;

document.getElementById("passengers").innerHTML=ticket.passengers;

document.getElementById("fare").innerHTML=ticket.fare;

document.getElementById("status").innerHTML=ticket.status;
</script>
</html>
